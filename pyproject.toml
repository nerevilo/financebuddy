[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["archive/"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",  # line too long — SQL strings make this noisy
]

[tool.pytest.ini_options]
testpaths = ["."]
python_files = ["test_*.py"]
pythonpath = ["."]
norecursedirs = ["archive", ".venv", "__pycache__", ".git"]
