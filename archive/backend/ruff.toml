target-version = "py311"
line-length = 120

[lint]
select = [
    "F401",  # unused-import
    "F811",  # redefined-unused-name
]
ignore = []

[lint.per-file-ignores]
"tests/*" = ["F401"]
"alembic/*" = ["F401", "F"]
# Bulk re-exports
"app/models/__init__.py" = ["F401"]
"app/routers/__init__.py" = ["F401"]
"app/schemas/__init__.py" = ["F401"]
